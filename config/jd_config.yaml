# =============================================================================
# jd_config.yaml
# THE ONLY JD-SPECIFIC FILE IN THE ENTIRE SYSTEM.
#
# Built from the REAL job_description.docx for the Redrob Hackathon
# ("Senior AI Engineer — Founding Team"). Skill names below are grounded in
# the actual 133-skill vocabulary found in candidates.jsonl (verified by
# direct inspection, not guessed) — including the rare plain-language
# variants ("Information Retrieval Systems", "Vector Representations",
# "Content Matching", etc.) that are handled via engine/skill_synonyms.py.
#
# NEW in this revision:
#   - role_descriptor (Item 4a): compiler-generated role phrase used by
#     reasoning.py instead of the old hardcoded string.
#   - disqualifiers now have enabled: true (Item 3): set to false to
#     disable per-JD. The JD compiler sets these automatically.
#   - stuffer_ramp_width (Item 6b): smooth ramp replaces binary cliff.
#   - skill_overrides (Item 2): manual pinning for embedding-derived clusters.
# =============================================================================

job_title: "Senior AI Engineer — Founding Team"
company: "Redrob AI"

# ---------------------------------------------------------------------------
# ROLE DESCRIPTOR (Item 4a)
# A short phrase describing what the role is about, used by reasoning.py
# in place of the old hardcoded "ranking/retrieval requirements" string.
# Generated by jd_compiler.py from the first must_have sentence; can be
# edited manually for clarity.
# ---------------------------------------------------------------------------
role_descriptor: "production ranking and retrieval system requirements for a founding AI engineer"

# ---------------------------------------------------------------------------
# SEMANTIC QUERIES
# Plain-English phrases describing the ideal candidate's CAREER, drawn
# directly from the JD's "how to read between the lines" section and its
# 90-day plan. These are embedded and matched against candidate career
# text (Channel 1).
# ---------------------------------------------------------------------------
semantic_queries:
  - "shipped an end to end ranking search or recommendation system to real users at meaningful scale"
  - "production experience with embeddings based retrieval deployed to real users, handling embedding drift and index refresh"
  - "production experience with vector databases or hybrid search infrastructure such as Pinecone Weaviate Qdrant Milvus OpenSearch Elasticsearch or FAISS"
  - "designed evaluation frameworks for ranking systems using NDCG MRR MAP and offline to online correlation or A/B testing"
  - "owns the intelligence layer deciding what recruiters or candidates see in a matching product"
  - "audited an existing BM25 or rule based ranking system and shipped a v2 with embeddings and hybrid retrieval"
  - "applied machine learning in production at a product company, not purely academic or research only work"
  - "strong opinions on hybrid versus dense retrieval and when to fine tune versus prompt an LLM"

# Optional: per-query polarity weights generated by jd_compiler.py.
# must_have=1.0, nice_to_have=0.6. Used by channel_semantic.py for weighted
# mean aggregation. All 8 queries above are must_have.
query_polarities:
  - "must_have"
  - "must_have"
  - "must_have"
  - "must_have"
  - "must_have"
  - "must_have"
  - "must_have"
  - "must_have"

# ---------------------------------------------------------------------------
# SKILL CLUSTERS
# Grouped by importance, weights applied during fusion (Channel 2).
# Names are the EXACT strings used in candidates.jsonl, confirmed by direct
# vocabulary inspection. Rare variants are canonicalized via
# engine/skill_synonyms.py before matching, so a candidate using
# "Vector Representations" instead of "Embeddings" still gets credit.
#
# NOTE: precompute/derive_skill_clusters.py can replace these lists
# automatically via embedding similarity. Run it after jd_compiler.py
# to get JD-agnostic cluster assignment for any new role.
# ---------------------------------------------------------------------------
skill_clusters:
  core:           # weight 1.0 — "things you absolutely need" in the JD
    - "Information Retrieval"
    - "Vector Search"
    - "Embeddings"
    - "Semantic Search"
    - "Sentence Transformers"
    - "Pinecone"
    - "FAISS"
    - "Weaviate"
    - "Milvus"
    - "Qdrant"
    - "pgvector"
    - "Elasticsearch"
    - "OpenSearch"
    - "Recommendation Systems"
    - "Learning to Rank"
    - "BM25"
    - "RAG"
    - "Hugging Face Transformers"
    - "LlamaIndex"
    - "Haystack"
    - "LLMs"
    - "Fine-tuning LLMs"
    - "NLP"
    - "Search Infrastructure"

  secondary:      # weight 0.6 — strong supporting evidence of genuine ML depth
    - "Python"
    - "PyTorch"
    - "TensorFlow"
    - "Machine Learning"
    - "Deep Learning"
    - "LoRA"
    - "QLoRA"
    - "PEFT"
    - "Prompt Engineering"
    - "LangChain"
    - "Feature Engineering"
    - "Open-source ML libraries"
    - "scikit-learn"

  nice_to_have:   # weight 0.3 — "would like but won't reject for"
    - "MLOps"
    - "MLflow"
    - "Kubeflow"
    - "BentoML"
    - "Weights & Biases"
    - "AWS"
    - "GCP"
    - "Kubernetes"
    - "Docker"
    - "Spark"
    - "Airflow"
    - "Data Science"

  # Anti-skills are split into two groups (see engine/channel_skills.py):
  #
  # domain_mismatch — penalized ONLY when present WITHOUT any core skill,
  # mirroring the JD's exact wording: "primary expertise is computer
  # vision, speech, or robotics WITHOUT significant NLP/IR exposure."
  # A multimodal candidate who has both CV skills AND core IR/NLP skills
  # is NOT penalized for this.
  domain_mismatch_anti_skills:
    - "Computer Vision"
    - "Image Classification"
    - "Object Detection"
    - "YOLO"
    - "OpenCV"
    - "CNN"
    - "GANs"
    - "Diffusion Models"
    - "Speech Recognition"
    - "ASR"
    - "TTS"

  # business_mismatch — always counted toward the anti-skill penalty
  # fraction; these indicate a non-technical primary identity regardless
  # of what else is on the profile (catches keyword-stuffer HR/Sales/
  # Content-Writer profiles directly).
  business_mismatch_anti_skills:
    - "Sales"
    - "Accounting"
    - "Tally"
    - "SAP"
    - "Six Sigma"
    - "Marketing"
    - "SEO"
    - "Content Writing"
    - "Salesforce CRM"
    - "Illustrator"
    - "Photoshop"

# ---------------------------------------------------------------------------
# SKILL OVERRIDES (Item 2)
# Manual cluster pinning for embedding-derived assignments. These take
# precedence over derive_skill_clusters.py output. Format:
#   cluster_name:
#     - "Exact Skill Name"
# Leave empty ({}) to let the embedding step decide everything.
# ---------------------------------------------------------------------------
skill_overrides: {}

# ---------------------------------------------------------------------------
# STRUCTURED CONSTRAINTS (Channel 3)
# Pulled directly from the JD's "On location, comp, and logistics" and
# "What we mean by 5-9 years" sections.
#
# ITEM 7: Any sub-block can be omitted to make that scorer return 1.0
# (neutral). E.g. remove the location: block entirely for a remote JD.
# ---------------------------------------------------------------------------
constraints:
  experience:
    ideal_min: 5
    ideal_max: 9
    ideal_center: 7        # JD's "ideal candidate" framing: 6-8 yoe, center ~7
    hard_min: 3
    hard_max: 14            # JD explicitly says it'll consider outside-band candidates if other signals are strong

  location:
    preferred_cities: ["Pune", "Noida"]
    welcome_cities: ["Hyderabad", "Mumbai", "Delhi", "Bangalore"]  # explicitly named as welcome in the JD
    required_country: "India"
    relocation_credit: 0.6   # JD explicitly invites relocation from Tier-1 Indian cities
    no_visa_sponsorship: true  # outside-India candidates are case-by-case, no visa sponsorship

  company:
    preferred_industries: ["Product", "AI/ML", "SaaS", "Internet", "Software",
                            "Fintech", "E-commerce", "EdTech", "Gaming",
                            "HealthTech", "HealthTech AI", "Conversational AI",
                            "Voice AI", "AI Services", "AdTech"]
    penalized_industries: ["IT Services", "Consulting"]
    consulting_firm_names: ["TCS", "Infosys", "Wipro", "Accenture", "Cognizant", "Capgemini"]
    preferred_company_sizes: ["11-50", "51-200", "201-500", "501-1000"]

  notice_period:
    ideal_max_days: 30     # JD: "we'd love sub-30-day notice. We can buy out up to 30 days."
    higher_bar_days: 30    # 30+ day candidates still in scope but bar is higher
    hard_max_days: 150

  work_mode:
    preference: "hybrid"

  # Explicit JD disqualifiers / anti-patterns (Channel 3 sub-checks)
  # ITEM 3: each disqualifier now has an `enabled` flag.
  # Set enabled: false to disable for a new JD (e.g. an EM role would set
  # tech_lead_drift: enabled: false since drifting toward management is fine).
  # The JD compiler sets these automatically from the not_wanted section.
  # Absent `enabled` key → treated as true (backward compatible).
  disqualifiers:
    title_chase:
      enabled: true
      max_avg_tenure_months: 18     # "switching every 1.5 years" chasing titles
      min_roles_to_flag: 3
      seniority_words: ["senior", "staff", "principal", "lead"]
    tech_lead_drift:
      enabled: true
      drift_title_words: ["architect", "engineering manager", "director", "head of", "vp "]
      min_current_role_months: 18    # "hasn't written production code in 18 months"
    pure_research_no_production:
      enabled: true
      research_industries: ["Academia", "Research"]
      production_keywords: ["production", "shipped", "deployed", "real users", "scale", "live"]
    shallow_ai_recent_only:
      enabled: true
      max_core_skill_duration_months: 12
      min_yoe_to_flag: 2
    pure_consulting_career_enabled: true
    pure_consulting_career_penalty_multiplier: 0.5
    closed_source_no_validation:
      enabled: true
      min_yoe_to_flag: 5
      github_activity_threshold: 0     # -1 or 0 means no/negligible GitHub signal
      penalty_multiplier: 0.92         # small, soft penalty — not a hard disqualifier

# ---------------------------------------------------------------------------
# CHANNEL WEIGHTS (fusion.py reads these — tune without touching code)
# semantic + skills + career must sum to 1.0 (additive layer).
# behavioral + integrity are MULTIPLICATIVE, not part of that sum.
# ---------------------------------------------------------------------------
channel_weights:
  semantic: 0.32
  skills: 0.22
  career: 0.26
  behavioral: 0.12   # informational here; applied multiplicatively in fusion
  integrity: 0.08    # informational here; applied multiplicatively in fusion

# ---------------------------------------------------------------------------
# STUFFER DETECTION (Layer 3)
# ITEM 6b: stuffer_ramp_width replaces binary cliff.
# The penalty ramps linearly from 1.0 (no penalty) at gap=gap_threshold
# to penalty_multiplier at gap=gap_threshold+stuffer_ramp_width.
# semantic_blend_alpha: weight of mean vs max in semantic aggregation (Item 6a).
# ---------------------------------------------------------------------------
stuffer_detection:
  gap_threshold: 0.35      # tightened from 0.40: captures thin-career MLEs (Locobuzz-type)
  stuffer_ramp_width: 0.15   # smooth ramp width; 0 = original binary cliff behavior
  semantic_blend_alpha: 0.5  # 0.5*mean + 0.5*max; 1.0 = pure mean (original)
  penalty_multiplier: 0.3
  apply_to_top_n: 300

# ---------------------------------------------------------------------------
# INTEGRITY THRESHOLDS (Channel 5)
# Calibrated against the REAL dataset's actual honeypot population
# (verified by direct inspection — see README "Calibration notes").
# ---------------------------------------------------------------------------
integrity:
  # Fixed: was 60, which let the 96-month gap on CAND_0039754 pass.
  # Real profiles drift <5 months; 30 absorbs overlapping roles + rounding.
  timeline_consistency_tolerance_months: 30
  # A gap > severe_multiplier x tolerance fires as a second independent check.
  # 3x30 = 90 months threshold; CAND_0039754 has 96-month gap => fires.
  severe_timeline_gap_multiplier: 3
  role_duration_buffer_months: 12
  skill_duration_buffer_months: 48
  zero_duration_expert_cluster_min: 3
  title_skill_coherence_min: 0.25
  skill_career_coherence_min: 0.25
  # honeypot_threshold: 2 (set in code DEFAULT_PARAMS)
  failure_multipliers:
    "0": 1.0
    "1": 0.7
    # 2+ failures = DISQUALIFIED (was 0.3 — soft dampener that let honeypots
    # survive via high fit score). Hard 0.0 matches the is_honeypot flag.
    "2+": 0.0

# ---------------------------------------------------------------------------
# BEHAVIORAL PARAMETERS (Channel 4) — field names match redrob_signals.*
# ---------------------------------------------------------------------------
behavioral:
  recency_midpoint_days: 90
  recency_scale_days: 30
  availability_open_to_work_weight: 0.6
  availability_notice_weight: 0.4
  availability_notice_cap_days: 180
  market_validation_max_saves_30d: 80
  # Floor raised 0.3->0.75: behavioral nudges by max 25%, never evicts tier-5s
  rescale_floor: 0.75
  rescale_ceiling: 1.0
  weights:
    recency: 0.30
    # Halved from 0.25: response rate is noisy; Sr Eng with 60d notice still in scope
    responsiveness: 0.10
    availability: 0.35
    market_validation: 0.10
    reliability: 0.10
    verification: 0.025
    profile_investment: 0.025

# ---------------------------------------------------------------------------
# EMBEDDING MODEL
# ITEM 5: place model weights at artifacts/models/all-MiniLM-L6-v2/
# by running: python scripts/download_model.py --artifacts-dir artifacts
# rank.py and precompute scripts will load from there with zero network.
# ---------------------------------------------------------------------------
embedding:
  model_name: "all-MiniLM-L6-v2"
  dimension: 384

# ---------------------------------------------------------------------------
# OUTPUT
# ---------------------------------------------------------------------------
output:
  top_n: 100
