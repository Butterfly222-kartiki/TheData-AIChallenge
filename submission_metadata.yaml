# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) to design and implement the full five-channel
  ranking architecture, calibrate integrity/credibility thresholds against
  direct inspection of the real candidates.jsonl (skill vocabulary,
  honeypot patterns, stuffer patterns), and write/test all code in this
  repository. No candidate data was sent to any third-party LLM API at
  ranking time — rank.py makes zero network calls. Embeddings use a local
  sentence-transformers model (or a local TF-IDF+LSA fallback if the model
  isn't available); no candidate data ever leaves the machine.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Five independent 0-1 scoring channels, combined by a config file that is
  the ONLY job-description-specific artifact in the system:
  (1) Semantic — career-narrative embedding vs 8 JD-intent query phrases,
  catches "Tier 5" candidates who describe relevant work without buzzwords.
  (2) Skills — credibility = proficiency_weight * log(1+duration) *
  log(1+endorsements), verified against the real data to separate genuine
  experts (endorsements 16-40, duration 35-95mo) from keyword stuffers
  (endorsements 0-4, duration 6-17mo) by ~2 orders of magnitude. Includes a
  skill-name synonym map for rare plain-language variants found in the
  dataset (e.g. "Vector Representations" -> Embeddings).
  (3) Career — title/experience/industry/location/notice fit, plus six
  explicit disqualifier checks lifted directly from the JD text (title-
  chasing, tech-lead drift, pure-research-no-production, shallow recent-
  only AI skills, pure-consulting career, closed-source-no-validation).
  (4) Behavioral and (5) Integrity are applied MULTIPLICATIVELY, not
  additively, since an unreachable or fabricated candidate is disqualifying
  regardless of raw skill match. Integrity thresholds were calibrated by
  directly inspecting the dataset's actual honeypot population (timeline/
  role-duration impossibilities, zero-duration "expert" skill clusters).
  A dual-embedding stuffer detector compares skill-text-vs-JD similarity
  against career-text-vs-JD similarity per candidate. Full 100K run: ~27s
  ranking time, 0 honeypots and 0 obvious stuffers in the top 100, 15 of
  the dataset's 25 most senior AI-titled candidates captured in the top 100.

